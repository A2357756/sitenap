<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
    <h3>Screen Veil</h3>

    
    <div class="duration-row">
        <label for="duration">持續時間：<span id="duration-value">5</span> 分鐘</label>
        <input type="range" id="duration" min="1" max="10" step="1" value="5">
    </div>

<label for="switch" class="switch-label">開關切換</label>
<div class="switch small" id="switch">
    <div class="knob"></div>
</div>

<label for="mode-switch" class="switch-label">模式切換</label>
<div class="switch" id="mode-switch">
    <div class="knob"></div>
</div>


    <p id="status">Status: OFF</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
