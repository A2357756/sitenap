<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
    <h3>SiteNap</h3>

    
    <div class="duration-row">
        <label for="duration">持續時間：<span id="duration-value">5</span> 分鐘</label>
        <input type="range" id="duration" min="5" max="100" step="5" value="5">
    </div>

<label for="switch" class="switch-label">開關切換</label>
<div class="switch small" id="switch">
    <div class="knob"></div>
</div>

<label class="lock-row">
    <input type="checkbox" id="lock-checkbox">
    鎖定開關
</label>

<label for="mode-switch" class="switch-label">模式切換</label>
<div class="mode-options">
    <button class="mode-btn" data-mode="breathe">轉圈</button>
    <button class="mode-btn" data-mode="cat">貓咪</button>
    <button class="mode-btn" data-mode="cloud">睡覺雲</button>
</div>
</div>


    <p id="status">Status: OFF</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
